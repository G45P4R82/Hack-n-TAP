name: Test Build & Install

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Install from wheel
        run: pip install dist/*.whl

      - name: Verify import
        run: python -c "from tap.main import main; print('✔ Import OK')"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Verify entry point exists
        run: which tap

      - name: Install from GitHub repo (system test)
        run: |
          pip uninstall hack-n-tap -y
          pip install git+https://github.com/G45P4R82/Hack-n-TAP.git
          python -c "from tap.main import main; print('✔ GitHub install OK')"
